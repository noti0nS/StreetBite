<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreetBite</title>
    <link rel="stylesheet" href="../Styles/streetBite.css" />
    <link id="pageCSS" rel="stylesheet" href="" />
    <script src="../Scripts/streetBite.js" defer></script>
    <link
      rel="shortcut icon"
      href="../Imgs/images/favcon.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <section class="mainSection">
      <aside class="sideBar">
        <img class="logo" src="../Imgs/images/StreetBite-logo.png" alt="Logo StreetBite" />
        <div class="buttonsNav">
          <a class="navBarButtons" id="homeButton" href="Iframes/home.html">
            <span class="navIcon homeIcon" aria-hidden="true"></span>Início
          </a>
          <a class="navBarButtons" id="menuButton" href="Iframes/menu.html">
            <span class="navIcon menuIcon" aria-hidden="true"></span>Cardápio
          </a>
          <a class="navBarButtons" id="ordersButton" href="Iframes/requests.html">
            <span class="navIcon orderIcon" aria-hidden="true"></span>Pedidos
          </a>
          <a class="navBarButtons" id="settingsButton" href="Iframes/settings.html">
            <span class="navIcon settingsIcon" aria-hidden="true"></span>Configurações
          </a>
        </div>
      </aside>
      <div class="contentArea" id="contentArea"></div>
    </section>

    <!-- VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sienna-accessibility@latest/dist/sienna-accessibility.umd.js" defer></script>
  </body>
  
</html>
