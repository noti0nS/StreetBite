<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreetBite</title>
    <link rel="stylesheet" href="../Styles/streetBite.css" />
    <link id="pageCSS" rel="stylesheet" href="" />
    <script src="../Scripts/streetBite.js" defer></script>
    <link
      rel="shortcut icon"
      href="../Imgs/images/favcon.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <section class="mainSection">
      <aside class="sideBar" aria-label="Barra lateral de navegação">
        <img class="logo" src="../Imgs/images/StreetBite-logo.png" alt="Logo StreetBite" />
        <div class="buttonsNav" aria-label="Navegação principal">
          <a class="navBarButtons" id="homeButton" href="Iframes/home.html" aria-label="Abrir página Início">
            <span class="navIcon homeIcon" aria-hidden="true"></span>
            <span class="navLabel">Início</span>
          </a>
          <a class="navBarButtons" id="menuButton" href="Iframes/menu.html" aria-label="Abrir página Cardápio">
            <span class="navIcon menuIcon" aria-hidden="true"></span>
            <span class="navLabel">Cardápio</span>
          </a>
          <button class="mobileActionButton" id="mobileActionButton" type="button" aria-label="Abrir ações rápidas" aria-expanded="false" title="Ações rápidas">
            <span class="mobileActionButtonGlyph" aria-hidden="true">+</span>
          </button>
          <a class="navBarButtons" id="ordersButton" href="Iframes/requests.html" aria-label="Abrir página Pedidos">
            <span class="navIcon orderIcon" aria-hidden="true"></span>
            <span class="navLabel">Pedidos</span>
          </a>
          <a class="navBarButtons" id="settingsButton" href="Iframes/settings.html" aria-label="Abrir página Configurações">
            <span class="navIcon settingsIcon" aria-hidden="true"></span>
            <span class="navLabel">Configurações</span>
          </a>
        </div>
        <div class="mobileQuickActions" id="mobileQuickActions" aria-hidden="true">
          <button class="mobileQuickAction" id="quickCreateItem" type="button" aria-label="Criar novo item">Item</button>
          <button class="mobileQuickAction" id="quickCreateOrder" type="button" aria-label="Criar novo pedido">Pedido</button>
        </div>
      </aside>
      <div class="contentArea" id="contentArea" aria-live="polite"></div>
    </section>

    <div class="floatingActionButtons" id="floatingActionButtons" aria-label="Acoes de acessibilidade e tema">
      <button class="themeIconButton" id="themeToggleSidebarButton" type="button" aria-label="Ativar modo escuro" aria-pressed="false" title="Alternar tema">
        <span id="themeToggleIcon" class="themeIconGlyph" aria-hidden="true">☾</span>
      </button>
    </div>

    <!-- VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sienna-accessibility@latest/dist/sienna-accessibility.umd.js" defer></script>
  </body>
  
</html>
