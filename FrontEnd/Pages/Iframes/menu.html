<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../../Styles/menu.css" />
    <script src="../../Scripts/menu.js" defer></script>
  </head>
  <body>
    <main class="main">
      <section class="labelSection">
        <div>
          <h1>Cardápio</h1>
          <h2>Lista de Itens contidos no Cardápio</h2>
        </div>
        <nav>
          <button class="createItem" type="button">Criar Novo Item</button>
        </nav>
      </section>
      <section class="gridSection"></section>

      <section class="wizardSection" id="itemWizard" aria-label="Assistente de criação e edição de item">
        <div class="wizardContainer">
          <aside class="wizardVisual" aria-hidden="true">
            <div>
              <h3 class="wizardVisualTitle">StreetBite Studio</h3>
              <p>Cadastre itens do cardápio em um formulário direto e rápido.</p>
            </div>
            <p class="wizardVisualStep">Cadastro em etapa única</p>
          </aside>

          <div class="wizardMain">
            <header class="wizardHeader">
              <h2 class="wizardTitle" id="wizardTitle">Assistente de Configuração de Item</h2>
              <p class="wizardSubtitle" id="wizardSubtitle">Preencha os dados para criar ou editar um item do cardápio.</p>
            </header>

            <section class="wizardBody">
              <div class="wizardStep" id="wizardStepItem">
                <h3 class="wizardStepTitle">Dados do Item</h3>

                <div class="wizardGrid">
                  <div>
                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="inputName">Nome</label>
                      <input class="wizardField" type="text" id="inputName" />
                    </div>

                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="selectCategory">Categoria</label>
                      <select class="wizardField" id="selectCategory">
                        <option value="LANCHE">Lanche</option>
                        <option value="ACOMPANHAMENTO">Acompanhamento</option>
                        <option value="BEBIDA">Bebida</option>
                        <option value="COMBO">Combo</option>
                      </select>
                    </div>

                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="inputPrice">Preço</label>
                      <input class="wizardField" type="number" id="inputPrice" />
                    </div>

                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="inputDesc">Descrição</label>
                      <textarea class="wizardTextarea" id="inputDesc" placeholder="Descrição do item"></textarea>
                    </div>
                  </div>

                  <div>
                    <div class="imgDiv">
                      <div class="imgDivModal">
                        <img id="imageImg" src="" alt="Pré-visualização do item" />
                      </div>
                      <input class="hidden" type="file" id="files" accept="image/*" />
                      <label for="files" class="inputImg">Selecionar imagem</label>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <footer class="wizardFooter">
              <button class="wizardButton is-primary" id="wizardNext" type="button">Criar Item</button>
              <button class="wizardButton is-secondary" id="wizardCancel" type="button">Cancelar</button>
            </footer>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
