<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../../Styles/requests.css" />
    <script src="../../Scripts/requests.js" defer></script>
  </head>
  <body>
    <main class="main">
      <section class="labelSection">
        <div>
          <h1>Pedidos</h1>
          <h2>Lista de Pedidos</h2>
        </div>
        <nav>
          <button class="createOrder" id="openOrderWizard" type="button" aria-label="Criar novo pedido">
            Criar novo Pedido
          </button>
        </nav>
      </section>
      <section class="gridSection">
      </section>

      <section class="wizardSection" id="orderWizard" aria-label="Assistente de criação de pedido">
        <div class="wizardContainer">
          <aside class="wizardVisual" aria-hidden="true">
            <div>
              <h3 class="wizardVisualTitle">StreetBite Orders</h3>
              <p>Crie um novo pedido em um fluxo guiado sem sair da tela de pedidos.</p>
            </div>
            <p class="wizardVisualStep">2 passos para concluir</p>
          </aside>

          <div class="wizardMain">
            <header class="wizardHeader">
              <h2 class="wizardTitle" id="orderWizardTitle">Assistente de Criação de Pedido</h2>
              <p class="wizardSubtitle" id="orderWizardSubtitle">Selecione o local e adicione os dados do pedido.</p>
            </header>

            <section class="wizardBody">
              <div class="wizardStep" id="orderWizardStepLocal">
                <h3 class="wizardStepTitle">Passo 1: Seleção de Local</h3>
                <div class="wizardFieldGroup">
                  <label class="wizardFieldLabel" for="orderType">Tipo de atendimento</label>
                  <select class="wizardField" id="orderType" aria-label="Tipo de atendimento">
                    <option value="" hidden>--- Selecione ---</option>
                    <option value="delivery">Delivery</option>
                    <option value="retirada">Retirada/Comer no Local</option>
                  </select>
                </div>
              </div>

              <div class="wizardStep hidden" id="orderWizardStepDetails">
                <h3 class="wizardStepTitle">Passo 2: Dados e Itens</h3>

                <div class="wizardGrid">
                  <div>
                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="orderClientName">Nome do cliente</label>
                      <input class="wizardField" id="orderClientName" type="text" aria-label="Nome do cliente" />
                    </div>

                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="orderPhone">Telefone</label>
                      <input class="wizardField" id="orderPhone" type="text" aria-label="Telefone do cliente" />
                    </div>

                    <div class="wizardFieldGroup" id="addressGroup">
                      <label class="wizardFieldLabel" for="orderCep">CEP</label>
                      <input class="wizardField" id="orderCep" type="text" aria-label="CEP" />
                      <input class="wizardField" id="orderDistrict" type="text" placeholder="Bairro" disabled aria-label="Bairro" />
                      <input class="wizardField" id="orderStreet" type="text" placeholder="Rua" disabled aria-label="Rua" />
                      <input class="wizardField" id="orderNumber" type="text" placeholder="Número" aria-label="Número do endereço" />
                    </div>

                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="orderPayment">Método de pagamento</label>
                      <select class="wizardField" id="orderPayment" aria-label="Método de pagamento">
                        <option value="" hidden>--- Selecione ---</option>
                        <option value="PIX">PIX</option>
                        <option value="CRÉDITO">Crédito</option>
                        <option value="DÉBITO">Débito</option>
                        <option value="DINHEIRO">Dinheiro</option>
                      </select>
                    </div>
                  </div>

                  <div>
                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="orderProduct">Item do cardápio</label>
                      <select class="wizardField" id="orderProduct" aria-label="Item do cardápio">
                        <option value="" hidden>--- Selecione ---</option>
                      </select>
                    </div>

                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel" for="orderQuantity">Quantidade</label>
                      <input class="wizardField" id="orderQuantity" type="number" min="1" value="1" aria-label="Quantidade do item" />
                    </div>

                    <div class="wizardFieldGroup">
                      <button class="wizardButton is-secondary" id="addOrderItem" type="button" aria-label="Adicionar item ao pedido">Adicionar item</button>
                    </div>

                    <div class="wizardFieldGroup">
                      <label class="wizardFieldLabel">Resumo do pedido</label>
                      <div class="orderCart" id="orderCart"></div>
                      <div class="orderSubtotal" id="orderSubtotal">Subtotal: R$0.00</div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <footer class="wizardFooter">
              <button class="wizardButton is-secondary" id="orderWizardBack" type="button" aria-label="Voltar para o passo anterior">Voltar</button>
              <button class="wizardButton is-primary" id="orderWizardNext" type="button" aria-label="Ir para o próximo passo">Próximo &gt;</button>
              <button class="wizardButton is-secondary" id="orderWizardCancel" type="button" aria-label="Cancelar criação do pedido">Cancelar</button>
            </footer>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
