services:
  db:
    image: postgres@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    container_name: streetbite-db
    environment:
      POSTGRES_DB: streetbite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - streetbite_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d streetbite']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Api/src
      dockerfile: StreetBite.Api/Dockerfile
    image: streetbite-api
    container_name: streetbite-api
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=streetbite;Username=postgres;Password=postgres
    ports:
      - '5109:8080'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    image: streetbite-frontend
    container_name: streetbite-frontend
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_started

volumes:
  streetbite_db_data:
